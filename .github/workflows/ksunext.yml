name: Build KernelSU Next
on:
  workflow_dispatch:
    inputs:
      CPU:
        description: "分支"
        required: true
        default: 'sm7675'
      FEIL:
        description: "配置文件"
        required: true
        default: 'oneplus_ace_3v_v'
      CPUD:
        description: "处理器代号"
        required: true
        default: 'pineapple'
      ANDROID_VERSION:
        description: "内核安卓版本"
        required: true
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '6.1'
      KSUNEXT_ENABLED:
        description: "添加 KSU Next"
        required: true
        type: boolean
        default: false
      SUSFS_ENABLED:
        description: "添加 SUSFS (需同时启用KSU Next)"
        required: true
        type: boolean
        default: false
        if: ${{ github.event.inputs.KSUNEXT_ENABLED == 'true' }}

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          
      - name: Configure Git
        run: |
          git config --global user.name "build"
          git config --global user.email "3436378798@qq.com"

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt upgrade -y
          sudo apt install -y python3 git curl build-essential flex bison libssl-dev bc kmod

      - name: Validate inputs
        run: |
          # 验证 KernelSU 分支是否存在
          if [[ "${{ github.event.inputs.KSUNEXT_ENABLED }}" == "true" ]]; then
            if ! git ls-remote --exit-code https://github.com/rifsxd/KernelSU-Next refs/heads/next-susfs; then
              echo "::error::KernelSU Next 分支 next-susfs 不存在！"
              exit 1
            fi
          fi

          # 验证 OnePlus 仓库分支是否存在
          if ! git ls-remote --exit-code --heads https://github.com/OnePlusOSS/kernel_manifest.git "refs/heads/oneplus/${{ github.event.inputs.CPU }}"; then
            echo "::error::分支 oneplus/${{ github.event.inputs.CPU }} 不存在！"
            exit 1
          fi

      - name: Initialize repo and sync
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.CPU }} \
            -m ${{ github.event.inputs.FEIL }}.xml \
            --depth=1
          repo sync -j$(nproc) --force-sync --no-clone-bundle

          # 清理可能存在的干扰文件
          find . -name "abi_gki_protected_exports_*" -delete
          sed -i 's/ -dirty//g' kernel_platform/*/scripts/setlocalversion

      - name: Set up KernelSU Next
        if: github.event.inputs.KSUNEXT_ENABLED == 'true'
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs-dev
          cd KernelSU-Next

          # 生成版本号 (base=10200 + commit count)
          KSU_VERSION=$(($(git rev-list --count HEAD) + 10200))
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=.*/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: Set up SUSFS
        if: github.event.inputs.SUSFS_ENABLED == 'true' && github.event.inputs.KSUNEXT_ENABLED == 'true'
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}
          git clone --depth=1 https://github.com/TheWildJames/kernel_patches.git

          # 复制 SUSFS 组件
          cp -rv susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch kernel_platform/KernelSU-Next/
          cp -rv susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch kernel_platform/common/
          cp -rv susfs4ksu/kernel_patches/fs/* kernel_platform/common/fs/
          cp -rv susfs4ksu/kernel_patches/include/linux/* kernel_platform/common/include/linux/

          # 应用补丁
          cd kernel_platform/KernelSU-Next
          patch -p1 --forward < 10_enable_susfs_for_ksu.patch
          cd ../common
          patch -p1 --forward < 50_add_susfs_in_gki-${{ github.event.inputs.ANDROID_VERSION }}-${{ github.event.inputs.KERNEL_VERSION }}.patch

          # 其他必要补丁
          cp ../../kernel_patches/69_hide_stuff.patch .
          patch -p1 -F 3 < 69_hide_stuff.patch
          git add -A && git commit -m "BUILD: Apply SUSFS patches"

      - name: Build kernel
        run: |
          cd kernel_workspace
          chmod +x ./kernel_platform/oplus/build/oplus_build_kernel.sh
          ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ github.event.inputs.CPUD }} gki

      - name: Package AnyKernel3
        run: |
          git clone https://github.com/Kernel-SU/AnyKernel3 --depth=1
          rm -rf AnyKernel3/.git
          cp kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist/Image AnyKernel3/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_${{ github.event.inputs.FEIL }}_${{ env.KSUVER }}
          path: |
            AnyKernel3/*
            kernel_workspace/kernel_platform/out/msm-kernel-${{ github.event.inputs.CPUD }}-gki/dist/Image
