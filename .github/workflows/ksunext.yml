name: Build KernelSU Next

on:
  workflow_dispatch:
    inputs:
      CPU:
        description: "分支"
        required: true
        default: 'sm7675'
      FEIL:
        description: "配置文件"
        required: true
        default: 'oneplus_ace_3v_v'
      CPUD:
        description: "处理器代号"
        required: true
        default: 'pineapple'
      ANDROID_VERSION:
        description: "内核安卓版本"
        required: true
        default: 'android14'
      KERNEL_VERSION:
        description: "内核版本"
        required: true
        default: '6.1'
      KSUNEXT_ENABLED:
        description: "添加 KSU Next"
        required: true
        type: boolean
        default: false
      SUSFS_ENABLED:
        description: "添加 SUSFS"
        required: true
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 16384  # 增加空间保留
          temp-reserve-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Configure Git
        run: |
          git config --global user.name "CI Builder"
          git config --global user.email "ci@kernel.build"
          git config --global color.ui false

      - name: Install dependencies
        run: |
         sudo apt update && sudo apt upgrade -y
         sudo apt install -y python3 git curl

      - name: Install repo tool
        run: |
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: Initialize repo and sync
        timeout-minutes: 30
        run: |
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u https://github.com/OnePlusOSS/kernel_manifest.git \
            -b refs/heads/oneplus/${{ github.event.inputs.CPU }} \
            -m ${{ github.event.inputs.FEIL }}.xml \
            --depth=1 \
            --no-clone-bundle
          
          repo sync -c -j$(nproc) --force-sync --no-clone-bundle --no-tags
          
          # 修复版本标识
          find kernel_platform -type f -name setlocalversion -exec sed -i 's/-dirty//g; s/-modified//g' {} +

      - name: Setup KernelSU Next
        if: ${{ github.event.inputs.KSUNEXT_ENABLED == 'true' }}
        timeout-minutes: 15
        run: |
          cd kernel_workspace/kernel_platform
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next-susfs/kernel/setup.sh" | bash -s next-susfs-dev
          
          cd KernelSU-Next
          # 精确计算版本号
          KSU_VERSION=$(( $(git rev-list --count HEAD) + 10000 ))
          echo "KSUVER=${KSU_VERSION}" >> $GITHUB_ENV
          sed -i "s/DKSU_VERSION=.*/DKSU_VERSION=${KSU_VERSION}/" kernel/Makefile

      - name: Apply SUSFS Patches (Enhanced)
        if: ${{ github.event.inputs.SUSFS_ENABLED == 'true' }}
        run: |
          cd kernel_platform/common
          
          # 验证内核版本
          KERNEL_RELEASE=$(make kernelversion)
          if [[ "$KERNEL_RELEASE" != "${{ inputs.KERNEL_VERSION }}.*" ]]; then
            echo "::error::内核版本不匹配 (当前: $KERNEL_RELEASE)"
            exit 1
          fi
          
          # 应用补丁
          git apply --check 50_add_susfs_in_gki-...
          if ! git apply --verbose 50_add_susfs_in_gki-...; then
            echo "::error::补丁应用失败，请检查以下差异："
            git diff --no-index --color=always original_file.c patched_file.c
            exit 1
          fi
          
      - name: Build Kernel
        timeout-minutes: 120
        env:
          KSU_VERSION: ${{ env.KSUVER }}
        run: |
          cd kernel_workspace
          export KBUILD_BUILD_USER="CI-Builder"
          export KBUILD_BUILD_HOST="GitHub-Actions"
          
          # 记录完整构建日志
          {
            echo "=== 开始构建 ==="
            date
            
            if [[ "${{ github.event.inputs.KERNEL_VERSION }}" =~ ^6.(1|6)$ ]]; then
              ./kernel_platform/build_with_bazel.py \
                -t ${{ github.event.inputs.CPUD }} \
                --build_target=//private/msm-kernel-${{ github.event.inputs.CPUD }}:kernel_aarch64 \
                --action_env=KSU_VERSION \
                --verbose_failures
            else
              export LTO=thin
              ./kernel_platform/oplus/build/oplus_build_kernel.sh \
                ${{ github.event.inputs.CPUD }} gki \
                | grep -E 'warning:|error:'
            fi
            
            date
            echo "=== 构建结束 ==="
          } 2>&1 | tee build.log

          # 构建失败时自动终止
          if grep -q "BUILD FAILED" build.log; then
            echo "❌ 构建失败，请检查日志"
            exit 1
          fi

      - name: Package Artifacts
        timeout-minutes: 10
        run: |
          cd kernel_workspace
          
          # 精确查找构建产物
          IMAGE_PATH=$(find kernel_platform/out -name Image -type f -print -quit)
          DTB_PATH=$(find kernel_platform/out -name '*.dtb' -type f)
          
          if [[ -z "$IMAGE_PATH" ]]; then
            echo "❌ 未找到内核镜像文件，可能路径："
            find kernel_platform/out -name '*Image*'
            exit 1
          fi
          
          # 准备 AnyKernel3
          git clone --depth=1 https://github.com/Kernel-SU/AnyKernel3
          rm -rf AnyKernel3/.git
          
          cp "$IMAGE_PATH" AnyKernel3/
          [[ -n "$DTB_PATH" ]] && cp $DTB_PATH AnyKernel3/
          
          # 生成版本信息
          echo "Kernel Version: $(strings "$IMAGE_PATH" | grep 'Linux version' | head -n1)" > AnyKernel3/version-info.txt
          echo "Build Date: $(date +%Y-%m-%d)" >> AnyKernel3/version-info.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel-${{ github.event.inputs.CPUD }}-${{ github.event.inputs.FEIL }}-${{ env.KSUVER }}
          path: |
            kernel_workspace/AnyKernel3/*
            kernel_workspace/build.log
